<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <link rel="stylesheet" href="globals.css" />
    <link rel="stylesheet" href="styleguide.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="LOGIN-PAGES">
      <div class="header-top">
        <div class="LOGO">
          <div class="background"></div>
          <div class="div-wrapper"><div class="text-wrapper">SaleAI</div></div>
        </div>
        <div class="container">
          <div class="div-wrapper"><div class="div">Belum punya akun?</div></div>
          <button class="button">
            <div class="container-2"><div class="text-wrapper-2">Daftar</div></div>
          </button>
        </div>
      </div>
      <div class="main">
        <div class="left-side-login-form">
          <div class="container-3">
            <div class="branding-heading">
              <div class="div-2"><div class="text-wrapper-3">Masuk ke Akun Anda</div></div>
              <div class="div-2">
                <p class="kelola-bisnis-UMKM">Kelola bisnis UMKM Anda dengan lebih cerdas<br />menggunakan AI.</p>
              </div>
            </div>
            <div class="form">
              <div class="container-4">
                <div class="div-2"><label class="label" for="input-1">Email</label></div>
                <div class="input">
                  <input class="container-5" placeholder="nama@email.com" type="email" id="input-1" />
                </div>
              </div>
              <div class="container-4">
                <div class="container-6">
                  <div class="div-wrapper"><div class="text-wrapper-4">Password</div></div>
                  <div class="div-wrapper"><div class="text-wrapper-5">Lupa password?</div></div>
                </div>
                <div class="div-2">
                  <div class="container-wrapper"><input class="container-7" placeholder="••••••••" type="text" /></div>
                  <div class="button-2">
                    <div class="icon-wrapper">
                      <div class="icon"><img class="vector" src="img/image.svg" /></div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="margin">
                <div class="container-8">
                  <div class="input-2"></div>
                  <div class="div-wrapper"><div class="div">Ingat saya</div></div>
                </div>
              </div>
              <button class="button-3">
                <div class="button-shadow"></div>
                <div class="container-2"><div class="text-wrapper-6">Masuk</div></div>
              </button>
            </div>
            <div class="social-logins">
              <div class="horizontal-divider-wrapper"><div class="horizontal-divider"></div></div>
              <div class="background-wrapper">
                <div class="atau-masuk-dengan-wrapper"><div class="atau-masuk-dengan">ATAU MASUK DENGAN</div></div>
              </div>
            </div>
            <div class="container-9">
              <button class="button-4">
                <img class="material-icon-theme" src="img/material-icon-theme-google.svg" />
                <div class="container-2"><div class="text-wrapper-7">Google</div></div>
              </button>
              <button class="button-5">
                <div class="container-10">
                  <div class="vector-wrapper"><img class="img" src="img/vector.svg" /></div>
                </div>
                <div class="container-2"><div class="text-wrapper-7">SSO</div></div>
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="footer-for-mobile"><p class="p">© 2024 SaleAI. Semua Hak Dilindungi. UMKM Indonesia Berdaya.</p></div>
    </div>
  </body>
</html>
